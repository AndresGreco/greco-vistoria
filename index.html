<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greco Arquitetura — Vistoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════════
   GRECO ARQUITETURA — VISTORIA APP
   Variáveis da Marca
══════════════════════════════════════════════ */
:root {
  --bg:          #050505;
  --surface:     #0f0f0f;
  --surface2:    #161616;
  --surface3:    #1e1e1e;
  --ink:         #FFFFFF;
  --ink2:        #CCCCCC;
  --muted:       #666666;
  --accent:      #CFFF04;
  --accent-dim:  rgba(207,255,4,0.10);
  --accent-glow: rgba(207,255,4,0.22);
  --line:        rgba(255,255,255,0.07);
  --line2:       rgba(255,255,255,0.13);
  --critico:     #FF4D4D;
  --critico-bg:  rgba(255,77,77,0.12);
  --moderado:    #FF9500;
  --moderado-bg: rgba(255,149,0,0.12);
  --estetico:    #4A9EFF;
  --estetico-bg: rgba(74,158,255,0.12);
  --title: 'Montserrat', sans-serif;
  --body:  'Open Sans', sans-serif;
  --radius: 14px;
}

/* ─── Reset ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--body); background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.7; -webkit-font-smoothing: antialiased; }

/* ══════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════ */
#topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line2);
  padding: 0 40px;
  height: 60px;
  display: flex; align-items: center; gap: 12px;
}
.logo { font-family: var(--title); font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--ink); margin-right: auto; }
.logo span { color: var(--accent); }
.tbtn {
  background: transparent; border: 1px solid var(--line2);
  color: var(--ink2); padding: 7px 15px; border-radius: 8px;
  cursor: pointer; font-family: var(--title); font-size: 11px;
  font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  transition: .2s; white-space: nowrap;
}
.tbtn:hover { border-color: var(--accent); color: var(--accent); }
.tbtn.accent { background: var(--accent); color: #000; border-color: var(--accent); }
.tbtn.accent:hover { background: #bdf000; }

/* ══════════════════════════════════════════════
   LAYOUT PRINCIPAL
══════════════════════════════════════════════ */
#report { max-width: 1080px; margin: 0 auto; padding: 60px 40px 140px; }

/* ══════════════════════════════════════════════
   CAPA / COVER
══════════════════════════════════════════════ */
.cover {
  padding-bottom: 64px; margin-bottom: 64px;
  border-bottom: 1px solid var(--line2);
  position: relative; overflow: hidden;
}
.cover::before {
  content: '';
  position: absolute; top: -100px; right: -100px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
  pointer-events: none;
}
.cover-tag {
  display: inline-block; font-family: var(--title); font-size: 10px;
  font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: #000; background: var(--accent); padding: 5px 14px;
  border-radius: 20px; margin-bottom: 28px;
}
.cover h1 {
  font-family: var(--title); font-size: clamp(36px, 5vw, 60px);
  font-weight: 800; letter-spacing: -1px; line-height: 1.1;
  margin-bottom: 36px; color: var(--ink);
}
.cover h1 span { color: var(--accent); }
.ficha {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 1px; background: var(--line2); border-radius: var(--radius);
  overflow: hidden; max-width: 860px; border: 1px solid var(--line2);
}
.ficha-cell { background: var(--surface2); padding: 18px 22px; }
.ficha-cell label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; }
.ficha-cell input {
  background: transparent; border: none; color: var(--ink);
  font-family: var(--title); font-size: 14px; font-weight: 700;
  width: 100%; outline: none; padding: 0;
}
.ficha-cell input::placeholder { color: var(--muted); font-weight: 400; }

/* ══════════════════════════════════════════════
   SUMÁRIO
══════════════════════════════════════════════ */
.toc {
  background: var(--surface); border: 1px solid var(--line2);
  border-radius: var(--radius); padding: 28px 32px; margin-bottom: 64px;
}
.toc-label { font-family: var(--title); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
.toc ol { list-style: none; counter-reset: toc; }
.toc ol li {
  counter-increment: toc; padding: 10px 0;
  border-bottom: 1px solid var(--line); display: flex;
  align-items: center; gap: 16px; cursor: pointer; transition: .2s;
  font-size: 14px; color: var(--ink2);
}
.toc ol li:last-child { border-bottom: none; }
.toc ol li:hover { color: var(--accent); padding-left: 6px; }
.toc ol li::before {
  content: counter(toc,decimal-leading-zero);
  font-family: var(--title); font-size: 10px; font-weight: 700;
  color: var(--accent); min-width: 28px;
}

/* ══════════════════════════════════════════════
   SEÇÕES GERAIS
══════════════════════════════════════════════ */
.section { margin-bottom: 72px; }
.sec-header {
  display: flex; align-items: baseline; gap: 14px;
  padding-bottom: 14px; border-bottom: 1px solid var(--line2);
  margin-bottom: 28px;
}
.sec-num { font-family: var(--title); font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
.sec-title { font-family: var(--title); font-size: 22px; font-weight: 800; color: var(--ink); }
.sec-title span { color: var(--accent); }
.sec-text { color: var(--ink2); line-height: 1.8; margin-bottom: 14px; }
.sec-text[contenteditable="true"]:focus { outline: 1px dashed rgba(207,255,4,.3); border-radius: 4px; background: rgba(255,255,255,.02); }

/* ─── Lista metodologia ─── */
.meto-list { list-style: none; margin: 10px 0 18px; }
.meto-list li {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 9px 0; border-bottom: 1px solid var(--line); color: var(--ink2);
}
.meto-list li:last-child {
